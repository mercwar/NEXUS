<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEXUS_V1 // CYBORG_LIVE_DESKTOP</title>
<style>
:root {
    --primary-glow: #3fa9f5;   /* Holographic blue glow */
    --accent-pink: #9c27b0;    /* Purple accent */
    --bg-dark: #0A0F0D;        /* Deep matte black background */
    --window-bg: #121814;      /* Dark charcoal window fill */
    --text-light: #E0E0E0;     /* High contrast near-white body text */
    --text-muted: #90caf9;     /* Soft blue text */
}

body { 
    background: var(--bg-dark) url('https://mercwar.github.io') no-repeat center center fixed; 
    background-size: cover;
    color: var(--text-light); 
    font-family: 'JetBrains Mono','Fira Code','Segoe UI Monospace',monospace; 
    font-size: 14px;
    margin: 0; padding: 0; overflow: hidden;
}

#desktop { 
    width: 100vw; height: 100vh; position: relative; 
    background: rgba(10, 15, 13, 0.85); 
}

/* Icons */
.icon { 
    width: 90px; text-align: center; position: absolute; cursor: pointer; 
    filter: drop-shadow(0 0 8px var(--primary-glow)); 
    transition: transform 0.2s, filter 0.2s;
    padding: 8px; border-radius: 4px;
}
.icon:hover { transform: scale(1.05); background: rgba(63,169,245,0.15); }
.icon img { width: 48px; height: 48px; margin: 0 auto; border: 2px solid var(--primary-glow); border-radius: 6px; }
.icon span { font-size: 0.8em; margin-top: 6px; color: var(--primary-glow); }

/* Window */
.win32-window { 
    position: absolute; top: 120px; left: 160px; width: 640px; height: 420px; 
    border: 1px solid var(--primary-glow); background: var(--window-bg); 
    box-shadow: 0 0 20px var(--primary-glow); border-radius: 6px; 
    display: none; flex-direction: column; 
}
.title-bar { background: var(--primary-glow); color: #000; padding: 6px 12px; font-weight: bold; display: flex; justify-content: space-between; }
.window-body { padding: 20px; color: var(--text-muted); overflow-y: auto; flex-grow: 1; }

/* Taskbar */
.taskbar { position: absolute; bottom: 0; width: 100%; height: 40px; background: #0d1410; border-top: 1px solid var(--primary-glow); display: flex; align-items: center; }
.start-btn { background: var(--primary-glow); color: #000; padding: 4px 16px; font-weight: bold; margin-left: 8px; border-radius: 3px; cursor: pointer; }
#clock { margin-left: auto; padding-right: 15px; font-size: 0.9em; color: var(--primary-glow); font-weight: bold; }
</style>
</head>
<body>

<div id="desktop">
    <div id="icon-container"></div>

    <!-- Mercwar/Constellation Window -->
    <div class="win32-window" id="mercwar">
        <div class="title-bar">
            <span>Mercwar // Constellation</span>
            <span style="cursor:pointer;" onclick="document.getElementById('mercwar').style.display='none'">[X]</span>
        </div>
        <div class="window-body">
            <h3>.md Files in Directory</h3>
            <ul id="md-list"></ul>
        </div>
    </div>

    <div class="taskbar">
        <div class="start-btn" id="startBtn">START</div>
        <div style="margin-left:15px; font-size:0.85em; color:var(--text-light);">[NEXUS_V1] [CBORD] [SENTINEL]</div>
        <div id="clock">--:--:--</div>
    </div>
</div>

<script>
// Example .md files
const mdFiles = ["README.md","notes.md","changelog.md","constellation.md","mercwar.md"];
const list = document.getElementById("md-list");
mdFiles.forEach(f => { let li=document.createElement("li"); li.textContent=f; list.appendChild(li); });

// Clock
setInterval(()=>{ document.getElementById("clock").innerText=new Date().toLocaleTimeString(); },1000);

// Start button toggle
document.getElementById("startBtn").addEventListener("click",()=>{
    const win=document.getElementById("mercwar");
    win.style.display=(win.style.display==="none"||win.style.display==="")?"flex":"none";
});
</script>

</body>
</html>
